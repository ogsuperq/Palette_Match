services:
  - type: web
    name: palette-match-api
    runtime: python
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: palette_match_production
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ORIGIN_REGEX
        sync: false
      - key: ALLOW_DEMO_SEED
        value: "false"
